<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KTVE Kft. – további referenciafotók pergolákról, teraszfedésekről, kocsibeállókról és egyedi fa munkáinkról Győr–Moson–Sopron vármegyében.">
    <meta name="robots" content="index, follow">
    <title>Képgaléria – KTVE Kft. pergola, terasz, ácsmunka</title>
    <link rel="stylesheet" href="css/style.css">
    <script>window.sa_event=window.sa_event||function(){var a=[].slice.call(arguments);window.sa_event.q?window.sa_event.q.push(a):window.sa_event.q=[a]};</script>
</head>
<body class="bg-light">
    <header>
        <div class="container header-bar">
            <div class="logo">
                <p class="subpage-kicker"><a href="index.html">KTVE Kft. – Főoldal</a></p>
                <h1>Képgaléria</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html" class="btn">Főoldal</a></li>
                    <li><a href="index.html#work" class="btn">Munkáink</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="photo-gallery-page">
        <div class="container">
            <div class="photo-gallery-intro">
                <p>Az alábbi képek kiegészítik a főoldalon látható válogatást. Ide folyamatosan töltjük fel újabb kivitelezéseink fotóit.</p>
            </div>
            <noscript>
                <p class="photo-gallery-status">A galéria betöltéséhez szükség van a JavaScriptre. Kapcsolja be a böngészőben, majd frissítse az oldalt.</p>
            </noscript>
            <p id="photo-gallery-status" class="photo-gallery-status" role="status" aria-live="polite"></p>
            <ul id="photo-gallery-grid" class="photo-gallery-grid"></ul>
            <p class="gallery-back-wrap"><a href="index.html#work" class="btn">← Vissza a főoldali galériához</a></p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Pergola, terasz, ácsmunka – KTVE Kft.</p>
            <p>
                <a href="index.html" class="btn">Főoldal</a>
            </p>
        </div>
    </footer>

    <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <script>
    (function () {
      var BASE = 'images/gallery/';
      var statusEl = document.getElementById('photo-gallery-status');
      var grid = document.getElementById('photo-gallery-grid');
      if (!grid || !statusEl) return;

      function rejectUnsafeName(name) {
        if (typeof name !== 'string' || name.length === 0) return true;
        if (name.indexOf('/') !== -1 || name.indexOf('\\') !== -1) return true;
        if (name.indexOf('..') !== -1) return true;
        return false;
      }

      statusEl.textContent = 'Galéria betöltése…';

      fetch(BASE + 'manifest.json')
        .then(function (res) {
          if (!res.ok) throw new Error('manifest');
          return res.json();
        })
        .then(function (files) {
          if (!Array.isArray(files)) throw new Error('manifest');
          var frag = document.createDocumentFragment();
          files.forEach(function (name) {
            if (rejectUnsafeName(name)) return;
            var li = document.createElement('li');
            var img = document.createElement('img');
            img.src = BASE + encodeURIComponent(name);
            img.alt = 'Referenciafotó – pergola, teraszfedés és fa kivitelezés (KTVE Kft.)';
            img.loading = 'lazy';
            li.appendChild(img);
            frag.appendChild(li);
          });
          grid.appendChild(frag);
          statusEl.textContent = '';
          statusEl.setAttribute('hidden', '');
        })
        .catch(function () {
          statusEl.textContent = 'Nem sikerült betölteni a galériát. Frissítse az oldalt, vagy nézzen vissza később.';
        });
    })();
    </script>
</body>
</html>
